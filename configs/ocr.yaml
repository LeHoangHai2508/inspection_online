engine: easyocr  # paddleocr | ensemble | easyocr | tesseract | mock

# GPU settings
# auto = tự động detect GPU (khuyến nghị)
# true = force GPU (lỗi nếu không có GPU)
# false = force CPU
gpu: auto

# EasyOCR Language Profiles
# Thay vì load tất cả ngôn ngữ cùng lúc, chia thành profiles
# Mỗi profile chỉ load ngôn ngữ cần thiết → nhanh hơn, ít RAM hơn
easyocr_profiles:
  # Profile cơ bản: chỉ Latin + Vietnamese (nhanh nhất)
  latin_basic:
    - en
    - vi
  
  # Profile mở rộng: thêm các ngôn ngữ EU phổ biến
  latin_extended:
    - en
    - vi
    - fr
    - de
    - it
    - es
    - pt
  
  # Profile CJK: Trung/Nhật/Hàn (cần khi có tem châu Á)
  cjk:
    - en
    - ch_sim
    - ch_tra
    - ja
    - ko
  
  # Profile Middle East: Arabic
  middle_east:
    - en
    - ar
  
  # Profile Southeast Asia: Thai, Vietnamese
  southeast_asia:
    - en
    - vi
    - th

# Profile mặc định khi không chỉ định
default_profile: latin_basic

# Verifier settings (chỉ dùng khi engine: ensemble)
verifier:
  enabled: false  # Tắt mặc định để nhanh hơn
  min_confidence_to_skip: 0.60  # Giảm từ 0.82 để verify ít hơn
  min_block_width: 20
  min_block_height: 12
  max_blocks_per_image: 3  # Giảm từ 12 để nhanh hơn

confidence_threshold: 0.75

# strict_real_ocr: true  → fail hard nếu không có EasyOCR (dùng cho prod)
# strict_real_ocr: false → fallback mock (dùng cho dev/local)
strict_real_ocr: true

providers:
  - easyocr
  - paddleocr
  - tesseract
  - mock
