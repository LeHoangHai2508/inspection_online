engine: easyocr  # paddleocr | ensemble | easyocr | tesseract | mock

# GPU settings
# auto = tự động detect GPU (khuyến nghị)
# true = force GPU (lỗi nếu không có GPU)
# false = force CPU
gpu: true

# EasyOCR languages
# QUAN TRỌNG: 'en' phải đứng đầu
# CHỈ THÊM NGÔN NGỮ THỰC SỰ CẦN THIẾT để giảm thời gian load và RAM
# Mỗi ngôn ngữ thêm vào sẽ tăng ~300MB RAM và ~2s thời gian khởi tạo
easyocr_langs:
  - en       # English (bắt buộc)
  - fr       # French (phổ biến trên tem EU)
  - de       # German (phổ biến trên tem EU)
  - es       # Spanish
  - ch_sim   # Chinese Simplified (phổ biến trên tem châu Á)
  - ja       # Japanese (nếu có tem Nhật)
  # Bỏ comment các ngôn ngữ dưới nếu cần:
  # - pt       # Portuguese
  # - it       # Italian
  # - ru       # Russian
  # - ar       # Arabic
  # - ko       # Korean
  # - ch_tra   # Chinese Traditional
  # - th       # Thai
  # - vi       # Vietnamese

# Chỉ verify block khó
verifier:
  enabled: true
  min_confidence_to_skip: 0.82
  min_block_width: 20
  min_block_height: 12
  max_blocks_per_image: 12

confidence_threshold: 0.75

# strict_real_ocr: true  → fail hard nếu không có EasyOCR (dùng cho prod)
# strict_real_ocr: false → fallback mock (dùng cho dev/local)
strict_real_ocr: true

providers:
  - ensemble
  - easyocr
  - mock
