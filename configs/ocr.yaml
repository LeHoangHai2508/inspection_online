engine: tesseract
# Tách ngôn ngữ theo side để tăng tốc độ và độ chính xác
side_langs:
  side1: eng+fra+deu+ita+spa+por+rus+ara+chi_sim
  side2: eng+jpn+chi_sim+chi_tra+kor+tha+vie+rus
lang: eng
use_angle_cls: true
confidence_threshold: 0.75
# strict_real_ocr: true  → fail hard nếu không có PaddleOCR/Tesseract (dùng cho prod)
# strict_real_ocr: false → fallback mock (dùng cho dev/local)
strict_real_ocr: true
providers:
  - paddleocr
  - tesseract
  - mock
