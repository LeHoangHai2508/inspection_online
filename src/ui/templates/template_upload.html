{% extends "base.html" %}
{% block title %}Template Upload{% endblock %}

{% block content %}
<div class="page-header">
  <h1>Upload Template</h1>
</div>

<div class="card" style="max-width: 900px;">
  <form id="template-upload-form" enctype="multipart/form-data">
    <div class="form-grid" style="display:grid; grid-template-columns:1fr 1fr; gap:16px;">
      <div>
        <label>Template Name</label>
        <input type="text" name="template_name" class="input-sm" required />

        <label style="margin-top:12px;">Product Code</label>
        <input type="text" name="product_code" class="input-sm" required />

        <label style="margin-top:12px;">Created By</label>
        <input type="text" name="created_by" class="input-sm" value="operator_01" required />
      </div>

      <div>
        <label>
          <input type="radio" name="upload_mode" value="separate" checked onchange="toggleUploadMode()" />
          Upload Side 1 + Side 2 riêng
        </label>
        <div id="separate-upload" style="margin-top:8px;">
          <label>Side 1 File</label>
          <input type="file" name="side1_file" id="side1_file" accept="image/*,.pdf" />

          <label style="margin-top:12px;">Side 2 File</label>
          <input type="file" name="side2_file" id="side2_file" accept="image/*,.pdf" />
        </div>

        <label style="margin-top:16px;">
          <input type="radio" name="upload_mode" value="combined" onchange="toggleUploadMode()" />
          Upload Combined Template (tự động tách)
        </label>
        <div id="combined-upload" style="margin-top:8px; display:none;">
          <label>Combined Template File</label>
          <input type="file" name="combined_file" id="combined_file" accept="image/*" />
          <small style="color:#666;">Ảnh ngang chứa cả recto + verso, hệ thống sẽ tự tách</small>
        </div>
      </div>
    </div>

    <div style="margin-top:16px;">
      <button type="submit" class="btn btn-primary">Upload</button>
    </div>
  </form>

  <div id="upload-status" style="margin-top:12px;"></div>
</div>

<script>
function toggleUploadMode() {
  const mode = document.querySelector('input[name="upload_mode"]:checked').value;
  const separateDiv = document.getElementById("separate-upload");
  const combinedDiv = document.getElementById("combined-upload");
  const side1Input = document.getElementById("side1_file");
  const side2Input = document.getElementById("side2_file");
  const combinedInput = document.getElementById("combined_file");

  if (mode === "separate") {
    separateDiv.style.display = "block";
    combinedDiv.style.display = "none";
    side1Input.required = true;
    side2Input.required = true;
    combinedInput.required = false;
    combinedInput.value = "";
  } else {
    separateDiv.style.display = "none";
    combinedDiv.style.display = "block";
    side1Input.required = false;
    side2Input.required = false;
    side1Input.value = "";
    side2Input.value = "";
    combinedInput.required = true;
  }
}

document.getElementById("template-upload-form").addEventListener("submit", async (e) => {
  e.preventDefault();

  const form = e.target;
  const statusBox = document.getElementById("upload-status");
  statusBox.innerHTML = "Đang upload và OCR...";

  const fd = new FormData(form);

  try {
    const resp = await fetch("/api/templates/upload", {
      method: "POST",
      body: fd
    });

    const data = await resp.json();

    if (!resp.ok) {
      throw new Error(data.detail || "Upload template thất bại.");
    }

    statusBox.innerHTML = `Upload xong. Template ID: <b>${data.template_id}</b>`;
    window.location.href = `/templates/${data.template_id}/review`;
  } catch (err) {
    statusBox.innerHTML = `<span style="color:red;">${err.message}</span>`;
  }
});
</script>
{% endblock %}
